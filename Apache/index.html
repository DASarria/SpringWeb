<!DOCTYPE html>
<head>
        <title>ApacheServer-LoginFutions</title>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
</head>
<body>
        <header>
                <h1>Register and Login</h1>
        </header>
        <div>
        <h2>Register</h2>
                <form id="register-form">
                        <input id="correo-registro" type="email" placeholder="email" required>
                        <input id="password-registro" type="password" placeholder="password" required>
                        <button type="submit">Register</button>
                </form>
        </div>



        <div>
        <h2>Login</h2>
                <form id="login-form">
                        <input id="correo-ingreso" type="email" placeholder="email" required>
                        <input id="password-ingreso" type="password" placeholder="password" required>
                        <button type="submit">Login</button>
                </form>
        </div>
        <div>
                <h2>API Response</h2>
                <pre id="api-response">Esperando accion...</pre>
        </div>
        <script src="script.js"></script>
</body>
