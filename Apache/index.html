<!DOCTYPE html>
<head>
        <title>ApacheServer-LoginFutions</title>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
</head>
<body>
        <header>
                <h1>Register and Login</h1>
        </header>
        <div>
        <h2>Resgister</h2>
                <form>
                        <input id="correo-registro" placeholder="email">
                        <input id="contraseña-registro" placeholder="password">
                        <button>Register</button>
                </form>
        </div>



        <div>
        <h2>Login</h2>
                <form>
                        <input id="correo-ingreso" placeholder="email">
                        <input id="contraseña-ingreso" placeholder="password">
                        <button>Login</button>
                </form>
        </div>
</body>
